# Publishes the built site to branch `gh-pages`.
# Then: Repo → Settings → Pages → Build and deployment → Deploy from a branch
#       Branch: gh-pages  Folder: / (root)
#
# If the workflow fails: Settings → Actions → General → Workflow permissions
# → choose "Read and write permissions" (needed to push gh-pages).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-shorecast
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/css _site/js
          cp index.html _site/
          cp css/shorecast.css _site/css/
          cp js/shorecast.js _site/js/

      - name: Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
